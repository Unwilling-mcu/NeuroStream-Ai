<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NeuroStream AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    #splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
      z-index: 9999;
    }

    /* ── Particle canvas behind everything ── */
    #particles {
      position: absolute; inset: 0;
      pointer-events: none;
    }

    /* ── Red glow pulse in background ── */
    .glow-ring {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(229,9,20,0.18) 0%, transparent 70%);
      animation: glowPulse 2.4s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from { transform: scale(0.85); opacity: 0.4; }
      to   { transform: scale(1.15); opacity: 1; }
    }

    /* ── Icon container ── */
    .icon-wrap {
      position: relative;
      width: 130px; height: 130px;
      margin-bottom: 40px;
      opacity: 0;
      transform: scale(0.4);
      animation: iconIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
    }

    @keyframes iconIn {
      to { opacity: 1; transform: scale(1); }
    }

    .icon-wrap img, .icon-wrap svg {
      width: 100%; height: 100%;
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(229,9,20,0.3),
        0 0 40px rgba(229,9,20,0.4),
        0 20px 60px rgba(0,0,0,0.8);
    }

    /* ── App name ── */
    .app-name {
      display: flex; align-items: baseline; gap: 0;
      margin-bottom: 8px;
    }

    .name-neuro {
      font-size: 52px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      animation: revealText 0.8s cubic-bezier(0.4,0,0.2,1) 0.9s forwards;
    }

    .name-stream {
      font-size: 52px;
      font-weight: 300;
      color: rgba(255,255,255,0.75);
      letter-spacing: -0.03em;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      animation: revealText 0.8s cubic-bezier(0.4,0,0.2,1) 1.2s forwards;
    }

    .name-ai {
      font-size: 52px;
      font-weight: 800;
      color: #e50914;
      letter-spacing: -0.03em;
      margin-left: 10px;
      opacity: 0;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.9s forwards;
    }

    @keyframes revealText {
      to { opacity: 1; clip-path: inset(0 0% 0 0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.6s ease 2.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Red line sweep under name ── */
    .underline {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #e50914, transparent);
      border-radius: 2px;
      margin: 12px auto 0;
      animation: expandLine 0.6s ease 1.8s forwards;
    }

    @keyframes expandLine {
      to { width: 320px; }
    }

    /* ── Loading bar ── */
    .loader-wrap {
      position: absolute;
      bottom: 60px;
      width: 220px;
      opacity: 0;
      animation: fadeUp 0.4s ease 2.4s forwards;
    }

    .loader-track {
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      background: linear-gradient(90deg, #e50914, #ff6b35);
      border-radius: 2px;
      width: 0%;
      animation: loadFill 1.4s cubic-bezier(0.4,0,0.2,1) 2.5s forwards;
      box-shadow: 0 0 8px rgba(229,9,20,0.6);
    }

    @keyframes loadFill {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }

    .loader-text {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.15em;
      text-align: center;
      text-transform: uppercase;
      animation: blinkText 1.2s ease 2.6s infinite;
    }

    @keyframes blinkText {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ── Neural nodes floating ── */
    .neural-dot {
      position: absolute;
      border-radius: 50%;
      background: #e50914;
      animation: floatDot linear infinite;
      pointer-events: none;
    }

    @keyframes floatDot {
      0%   { transform: translateY(0) scale(1); opacity: 0.6; }
      50%  { transform: translateY(-30px) scale(1.3); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 0.6; }
    }

    /* ── Whole splash fade out ── */
    .fade-out {
      animation: splashOut 0.6s ease forwards !important;
    }

    @keyframes splashOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <div id="splash">
    <canvas id="particles"></canvas>
    <div class="glow-ring"></div>

    <!-- Floating neural dots -->
    <div class="neural-dot" style="width:6px;height:6px;left:15%;top:25%;animation-duration:3.1s;animation-delay:0.2s;opacity:0.4;"></div>
    <div class="neural-dot" style="width:4px;height:4px;left:25%;top:65%;animation-duration:2.7s;animation-delay:0.8s;opacity:0.3;"></div>
    <div class="neural-dot" style="width:5px;height:5px;left:75%;top:30%;animation-duration:3.4s;animation-delay:0.4s;opacity:0.35;"></div>
    <div class="neural-dot" style="width:3px;height:3px;left:80%;top:70%;animation-duration:2.9s;animation-delay:1.1s;opacity:0.25;"></div>
    <div class="neural-dot" style="width:7px;height:7px;left:10%;top:50%;animation-duration:3.8s;animation-delay:0s;opacity:0.2;"></div>
    <div class="neural-dot" style="width:4px;height:4px;left:88%;top:45%;animation-duration:2.5s;animation-delay:0.6s;opacity:0.3;"></div>
    <div class="neural-dot" style="width:5px;height:5px;left:50%;top:15%;animation-duration:3.2s;animation-delay:1.4s;opacity:0.25;"></div>
    <div class="neural-dot" style="width:3px;height:3px;left:40%;top:80%;animation-duration:2.6s;animation-delay:0.3s;opacity:0.3;"></div>

    <!-- App Icon -->
    <div class="icon-wrap">
      <!-- Inline SVG icon so it works without an image file -->
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="display:block;width:130px;height:130px;border-radius:28px;">
        <defs>
          <radialGradient id="ibg" cx="50%" cy="45%" r="55%">
            <stop offset="0%" stop-color="#1a0a0a"/>
            <stop offset="100%" stop-color="#050505"/>
          </radialGradient>
          <radialGradient id="ig" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#e50914" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#e50914" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="ing" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#e50914" stop-opacity="0.6"/>
          </radialGradient>
          <filter id="icrisp"><feGaussianBlur stdDeviation="2"/></filter>
        </defs>
        <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#ibg)"/>
        <ellipse cx="256" cy="240" rx="200" ry="180" fill="url(#ig)" filter="url(#icrisp)"/>
        <line x1="256" y1="108" x2="140" y2="195" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.25"/>
        <line x1="256" y1="108" x2="372" y2="195" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.25"/>
        <line x1="140" y1="195" x2="140" y2="330" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.18"/>
        <line x1="372" y1="195" x2="372" y2="330" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.18"/>
        <line x1="140" y1="330" x2="256" y2="400" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.25"/>
        <line x1="372" y1="330" x2="256" y2="400" stroke="#e50914" stroke-width="1.2" stroke-opacity="0.25"/>
        <line x1="140" y1="195" x2="372" y2="330" stroke="#ff4500" stroke-width="0.8" stroke-opacity="0.15"/>
        <line x1="372" y1="195" x2="140" y2="330" stroke="#ff4500" stroke-width="0.8" stroke-opacity="0.15"/>
        <rect x="148" y="155" width="52" height="202" rx="8" fill="#e50914"/>
        <rect x="312" y="155" width="52" height="202" rx="8" fill="#e50914"/>
        <polygon points="200,155 264,155 364,357 312,357" fill="#e50914"/>
        <rect x="148" y="155" width="52" height="18" rx="8" fill="#ff6b35" opacity="0.6"/>
        <rect x="312" y="155" width="52" height="18" rx="8" fill="#ff6b35" opacity="0.6"/>
        <circle cx="256" cy="108" r="9" fill="url(#ing)"/><circle cx="256" cy="108" r="5" fill="#fff" opacity="0.9"/>
        <circle cx="140" cy="195" r="7" fill="url(#ing)"/><circle cx="140" cy="195" r="3.5" fill="#fff" opacity="0.8"/>
        <circle cx="372" cy="195" r="7" fill="url(#ing)"/><circle cx="372" cy="195" r="3.5" fill="#fff" opacity="0.8"/>
        <circle cx="140" cy="330" r="7" fill="url(#ing)"/><circle cx="140" cy="330" r="3.5" fill="#fff" opacity="0.8"/>
        <circle cx="372" cy="330" r="7" fill="url(#ing)"/><circle cx="372" cy="372" r="3.5" fill="#fff" opacity="0.8"/>
        <circle cx="256" cy="400" r="9" fill="url(#ing)"/><circle cx="256" cy="400" r="5" fill="#fff" opacity="0.9"/>
        <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="#e50914" stroke-width="1.5" stroke-opacity="0.3"/>
      </svg>
    </div>

    <!-- Name -->
    <div class="app-name">
      <span class="name-neuro">Neuro</span>
      <span class="name-stream">Stream</span>
      <span class="name-ai">AI</span>
    </div>

    <div class="underline"></div>
    <p class="tagline">Stepping into the future</p>

    <!-- Loader -->
    <div class="loader-wrap">
      <div class="loader-track">
        <div class="loader-fill"></div>
      </div>
      <p class="loader-text">Initializing</p>
    </div>
  </div>

  <script>
    // ── Particle canvas ──────────────────────────────────────────
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const dots = Array.from({ length: 60 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.4 + 0.1,
    }));

    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      dots.forEach(d => {
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0) d.x = canvas.width;
        if (d.x > canvas.width) d.x = 0;
        if (d.y < 0) d.y = canvas.height;
        if (d.y > canvas.height) d.y = 0;

        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(229,9,20,${d.a})`;
        ctx.fill();
      });

      // Draw lines between close dots
      for (let i = 0; i < dots.length; i++) {
        for (let j = i + 1; j < dots.length; j++) {
          const dx = dots[i].x - dots[j].x;
          const dy = dots[i].y - dots[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 90) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(229,9,20,${0.12 * (1 - dist / 90)})`;
            ctx.lineWidth = 0.5;
            ctx.moveTo(dots[i].x, dots[i].y);
            ctx.lineTo(dots[j].x, dots[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // ── Cinematic sound — smooth Netflix-style ───────────────────
    // Pure sine waves only, very low gain, long slow envelopes
    // No harsh transients, no sawtooth, no square waves
    function playIntroSound() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ac = new AudioCtx();

        // Master compressor — prevents any clipping or harshness
        const master = ac.createDynamicsCompressor();
        master.threshold.value = -24;
        master.knee.value = 30;
        master.ratio.value = 4;
        master.attack.value = 0.05;
        master.release.value = 0.5;

        // Master gain — keep overall volume gentle
        const masterGain = ac.createGain();
        masterGain.gain.value = 0.38;

        master.connect(masterGain);
        masterGain.connect(ac.destination);

        // Helper — creates one smooth sine tone
        // All tones fade in slowly and fade out with a long tail
        const tone = (freq, start, dur, peak) => {
          const osc = ac.createOscillator();
          const g = ac.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          osc.connect(g);
          g.connect(master);

          const t = ac.currentTime;
          g.gain.setValueAtTime(0, t + start);
          // Slow fade in — 40% of duration
          g.gain.linearRampToValueAtTime(peak, t + start + dur * 0.4);
          // Hold briefly then long fade out
          g.gain.linearRampToValueAtTime(peak * 0.6, t + start + dur * 0.65);
          g.gain.linearRampToValueAtTime(0, t + start + dur);

          osc.start(t + start);
          osc.stop(t + start + dur + 0.05);
        };

        // --- Netflix-style sound design ---
        // 1. Deep warm bass note — enters first, sets the mood
        tone(82,  0.0, 2.8, 0.18);   // E2 — very deep, warm

        // 2. Mid note joins — like the Netflix "ta"
        tone(164, 0.5, 2.2, 0.14);   // E3 — one octave up

        // 3. Upper harmonic — adds shimmer, very soft
        tone(246, 1.0, 1.8, 0.07);   // B3 — gentle shimmer

        // 4. Highest note — the "ding" moment, barely audible
        tone(328, 1.4, 1.4, 0.04);   // E4 — whisper soft

        // 5. Sub-bass pulse — felt more than heard, like a cinema
        tone(41,  0.2, 2.0, 0.10);   // E1 — sub rumble

      } catch (e) {
        // Sound failed silently — app still works
      }
    }

    // ── Auto-dismiss and launch main app ────────────────────────
    // Play sound after short delay (user interaction not needed in Electron)
    setTimeout(playIntroSound, 300);

    // After all animations complete, fade out and notify Electron/React
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('fade-out');

      setTimeout(() => {
        splash.style.display = 'none';
        // If inside Electron renderer, signal the main window
        if (window.electronAPI?.splashDone) {
          window.electronAPI.splashDone();
        }
        // If this page is the splash window itself, close it
        if (window.close) {
          try { window.close(); } catch(e) {}
        }
      }, 650);
    }, 4000);
  </script>
</body>
</html>
